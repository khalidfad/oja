<div class="layout">
    <aside class="sidebar">
        <div class="logo">🐦</div>

        <nav>
            <a href="#/" class="nav-item" data-page="/" data-loading="...">
                <span class="icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="#/explore" class="nav-item" data-page="/explore" data-loading="...">
                <span class="icon">🔍</span>
                <span>Explore</span>
            </a>
            <a href="#/profile" class="nav-item" data-page="/profile" data-loading="...">
                <span class="icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>

        <button class="post-button" id="compose-btn">Post</button>

        <div style="margin-top: auto; padding: 20px 0;">
            <div class="flex gap-2">
                <div class="avatar">{{currentUser.avatar}}</div>
                <div>
                    <div class="font-bold">{{currentUser.name}}</div>
                    <div class="text-secondary">@{{currentUser.username}}</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main" id="main-outlet"></main>

    <aside class="right-sidebar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="search" placeholder="Search" autocomplete="off">
        </div>

        <div class="trending-card">
            <h3>Trends for you</h3>
            <div id="trends-list">
                <template data-each="trends" data-as="trend">
                    <div class="trending-item">
                        <div class="trending-category">{{trend.category}}</div>
                        <div class="trending-name">#{{trend.name}}</div>
                        <div class="trending-count">{{trend.tweets}} tweets</div>
                    </div>
                </template>
            </div>
        </div>

        <div class="trending-card">
            <h3>Who to follow</h3>
            <div class="trending-item">
                <div class="flex gap-2">
                    <div class="avatar">S</div>
                    <div>
                        <div class="font-bold">Sarah Chen</div>
                        <div class="text-secondary">@sarahcodes</div>
                    </div>
                </div>
                <button class="post-button" data-action="follow" style="margin-top:12px; padding:8px; font-size:1rem">Follow</button>
            </div>
            <div class="trending-item">
                <div class="flex gap-2">
                    <div class="avatar">M</div>
                    <div>
                        <div class="font-bold">Marcus Williams</div>
                        <div class="text-secondary">@marcusw</div>
                    </div>
                </div>
                <button class="post-button" data-action="follow" style="margin-top:12px; padding:8px; font-size:1rem">Follow</button>
            </div>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="composeModal">
    <div class="modal">
        <div class="modal-header">
            <button class="modal-close" data-action="modal-close" aria-label="Close">✕</button>
            <h2>New tweet</h2>
        </div>
        <div id="modal-compose-body"></div>
    </div>
</div>

<div class="modal-overlay" id="editProfileModal">
    <div class="modal" style="width:500px">
        <div class="modal-header">
            <button class="modal-close" data-action="modal-close" aria-label="Close">✕</button>
            <h2>Edit profile</h2>
        </div>
        <div id="modal-edit-profile-body"></div>
    </div>
</div>

<script type="module">
    /* global props, find */
    import { effect, each, on, modal, Out, component } from '../../../build/oja.core.esm.js';

    effect(() => {
        each(find('#trends-list'), 'trends', props.trends);
    });

    on('#compose-btn', 'click', () => {
        Out.component('components/compose.html', { currentUser: props.currentUser })
            .render(find('#modal-compose-body'));
        modal.open('composeModal');
    });

    component.onMount(() => {
        import('../../../build/oja.core.esm.js').then(({ notify }) => {
            notify.success(`Welcome back, ${props.currentUser.name}!`);
        });
    });
</script>

<!--
  components/image.html
  Smart image component — handles loading, loaded, and error states automatically.
  Uses lazy loading via IntersectionObserver by default.

  Demonstrates:
    - `container` variable (scoped to this instance — no document.getElementById needed)
    - component.onUnmount() for cleanup
    - Multiple instances on the same page without conflicts

  Data variables:
    {{src}}         — image URL to load
    {{alt}}         — alt text (default: '')
    {{fallback}}    — URL to show if image fails to load (optional)
    {{width}}       — CSS width  (default: '100%')
    {{height}}      — CSS height (default: 'auto')
    {{shape}}       — 'circle' | 'rounded' | 'square' | 'thumbnail' (default: 'square')
    {{lazy}}        — 'true' | 'false' — use IntersectionObserver (default: 'true')
    {{fit}}         — CSS object-fit value (default: 'cover')

  Usage:
    // Mount once
    await component.mount('#avatarSlot', 'components/image.html', {
        src:      user.avatarUrl,
        alt:      user.name,
        fallback: '/assets/default-avatar.png',
        width:    '80px',
        height:   '80px',
        shape:    'circle',
    });

    // Mount many (each is fully isolated — container is scoped per instance)
    hosts.forEach(host => {
        component.add('#hostGrid', 'components/image.html', {
            src:   host.logoUrl,
            alt:   host.name,
            width: '48px',
            shape: 'rounded',
        });
    });
-->

<div class="oja-img-wrap"
     style="width:{{width|default '100%'}};height:{{height|default 'auto'}}"
     data-shape="{{shape|default 'square'}}">

    <!-- Actual image — hidden until loaded -->
    <img class="oja-img-el"
         data-src="{{src}}"
         alt="{{alt}}"
         style="display:none;width:100%;height:100%;object-fit:{{fit|default 'cover'}}">

    <!-- Loading spinner — shown until image loads -->
    <div class="oja-img-loading">
        <svg class="oja-img-spinner" viewBox="0 0 24 24" fill="none"
             width="24" height="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2V6M12 18V22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07
                     M2 12H6M18 12H22M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- Error state — shown if image fails -->
    <div class="oja-img-error" style="display:none">
        {{if .fallback}}
        <img data-fallback="{{fallback}}"
             alt="{{alt}}"
             style="width:100%;height:100%;object-fit:{{fit|default 'cover'}}">
        {{else}}
        <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
            <path d="M12 8V12M12 16H12.01M21 12C21 16.97 16.97 21 12 21
                     C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3C16.97 3 21 7.03 21 12Z"
                  stroke="#dc3545" stroke-width="2" stroke-linecap="round"/>
        </svg>
        {{end}}
    </div>
</div>

<script type="module">
    import { component } from '../../src/js/component.js';

    // `container` is automatically injected by _exec.js —
    // scoped to THIS instance, safe to use even with multiple images on the page.

    const wrap       = container.querySelector('.oja-img-wrap');
    const imgEl      = container.querySelector('.oja-img-el');
    const loadingEl  = container.querySelector('.oja-img-loading');
    const errorEl    = container.querySelector('.oja-img-error');
    const fallbackEl = container.querySelector('[data-fallback]');

    const src  = imgEl?.dataset.src  || '';
    const lazy = wrap?.dataset.lazy !== 'false';  // lazy by default

    // Apply shape
    const shape = wrap?.dataset.shape || 'square';
    const radii = { circle: '50%', rounded: '12px', thumbnail: '4px', square: '0' };
    if (wrap) wrap.style.borderRadius = radii[shape] || '0';

    function loadImage() {
        if (!src) { showError(); return; }

        const img = new Image();

        img.onload = () => {
            imgEl.src            = src;
            imgEl.style.display  = '';
            loadingEl.style.display = 'none';
            // Fade in
            imgEl.style.opacity    = '0';
            imgEl.style.transition = 'opacity 0.3s ease';
            requestAnimationFrame(() => { imgEl.style.opacity = '1'; });
        };

        img.onerror = showError;
        img.src     = src;
    }

    function showError() {
        loadingEl.style.display = 'none';
        errorEl.style.display   = '';
        // If a fallback img element exists, set its src
        if (fallbackEl) fallbackEl.src = fallbackEl.dataset.fallback;
    }

    if (!lazy) {
        loadImage();
    } else if (typeof IntersectionObserver !== 'undefined') {
        const observer = new IntersectionObserver(
            (entries) => {
                if (entries[0].isIntersecting) {
                    loadImage();
                    observer.disconnect();
                }
            },
            { threshold: 0.1, rootMargin: '50px' }
        );

        observer.observe(wrap);

        // Clean up observer if the page navigates away before image is visible
        component.onUnmount(() => observer.disconnect());
    } else {
        // Fallback for environments without IntersectionObserver
        loadImage();
    }
</script>

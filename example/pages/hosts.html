<!--
  pages/hosts.html
  Demonstrates: template.each() with filter/sort/chunk,
                Responder empty state, Go-style {{if}}/{{range}},
                data-if, data-if-class, data-bind
-->
<div class="page" data-title="Hosts">
    <div class="page-header">
        <h1>Hosts</h1>
        <div class="header-actions">
            <input id="host-search" type="text" placeholder="Filter hosts..." class="search-input">
            <select id="host-sort" class="select-sm">
                <option value="name">Sort: Name</option>
                <option value="reqs">Sort: Requests</option>
                <option value="errors">Sort: Errors</option>
                <option value="p99">Sort: Latency</option>
            </select>
            <label class="toggle-label">
                <input type="checkbox" id="alive-only"> Alive only
            </label>
        </div>
    </div>

    <div id="hostsContainer">
        <div data-loading="hosts" class="loading-row">Loading hosts...</div>
        <div data-empty="hosts"   style="display:none"></div>

        <template data-each="hosts" data-as="h">
            <div class="host-card" data-if-class="h.alive:host-alive,h.tls:host-tls"
                 data-bind="data-id:h.id">

                <div class="host-header">
                    <div class="host-info">
                        <span class="host-dot" data-if-class="h.alive:dot-green"></span>
                        <strong class="host-name">{{h.hostname}}</strong>
                        <!-- Go-style inline conditional -->
                        <span class="badge {{if .h.tls}}badge-tls{{else}}badge-no-tls{{end}}">
                            {{if .h.tls}}🔒 {{h.tlsMode}}{{else}}No TLS{{end}}
                        </span>
                        {{if .h.tlsDaysLeft}}
                        <span class="badge badge-expiry" data-if-class="h.tlsDaysLeft:badge-warn">
                            {{h.tlsDaysLeft}}d left
                        </span>
                        {{end}}
                    </div>
                    <div class="host-actions">
                        <a data-bind="href:h.detailUrl" class="btn-sm">Detail</a>
                    </div>
                </div>

                <div class="host-meta muted">
                    {{range .h.domains}}<span class="domain-badge">{{.}}</span>{{end}}
                </div>

                <div class="host-stats">
                    <span><strong>{{h.totalReqs | bytes}}</strong> reqs</span>
                    <span><strong>{{h.errors}}</strong> errors</span>
                    <span><strong>{{h.p99Ms}}ms</strong> p99</span>
                    <span><strong>{{h.activeBackends}}</strong> backends</span>
                </div>

                <!-- Routes loop — nested data-each -->
                <template data-each="routes" data-as="route">
                    <div class="route-row">
                        <span class="route-method">{{route.method}}</span>
                        <span class="route-path">{{route.path}}</span>
                        <span class="muted">{{route.backends.length}} backends</span>
                    </div>
                </template>
                <div data-empty="routes" style="display:none" class="muted route-row">
                    No routes configured
                </div>
            </div>
        </template>
    </div>
</div>

<script type="module">
    import { each, template, fill } from '../../src/js/template.js';
    import { Responder }             from '../../src/js/responder.js';
    import { on }                    from '../../src/js/events.js';
    import { api }                   from '../app.js';

    // Custom filter for byte formatting
    template.filter('bytes', n => {
        if (!n) return '0';
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
        return String(n);
    });

    let _allHosts = [];
    const container = document.getElementById('hostsContainer');

    async function loadHosts() {
        _allHosts = await api.get('/api/hosts') || [];
        renderHosts();
    }

    function renderHosts() {
        const search   = document.getElementById('host-search')?.value?.toLowerCase() || '';
        const sortBy   = document.getElementById('host-sort')?.value   || 'name';
        const aliveOnly= document.getElementById('alive-only')?.checked || false;

        each(container, 'hosts', _allHosts, {
            filter: (h) => {
                if (aliveOnly && !h.alive) return false;
                if (search) return h.hostname.toLowerCase().includes(search)
                    || h.domains.some(d => d.includes(search));
                return true;
            },
            sort: (a, b) => {
                if (sortBy === 'reqs')   return b.totalReqs - a.totalReqs;
                if (sortBy === 'errors') return b.errors - a.errors;
                if (sortBy === 'p99')    return b.p99Ms - a.p99Ms;
                return a.hostname.localeCompare(b.hostname);
            },
            map: (h) => ({
                ...h,
                detailUrl: `#/hosts/${h.id}`,
            }),
            chunk: 3,   // render 3 at a time — demos chunked rendering
            empty: Responder.html(`
            <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <p>No hosts match your filters</p>
                <button onclick="document.getElementById('host-search').value='';
                    document.getElementById('alive-only').checked=false"
                    class="btn-sm">Clear filters</button>
            </div>
        `),
        });

        // Render nested routes loop for each host card
        document.querySelectorAll('.host-card').forEach(card => {
            const hostId = card.dataset.id;
            const host   = _allHosts.find(h => h.id === hostId);
            if (host) {
                each(card, 'routes', host.routes, {
                    map: r => ({ ...r, backends: r.backends || [] })
                });
            }
        });
    }

    // Wire controls
    on('#host-search', 'input',  renderHosts);
    on('#host-sort',   'change', renderHosts);
    on('#alive-only',  'change', renderHosts);

    await loadHosts();
</script>

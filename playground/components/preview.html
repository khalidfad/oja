<div class="preview-wrap">
    <div class="preview-header">
        <div class="preview-url-bar">
            <span class="url-scheme">preview</span>
            <span class="url-path" id="preview-route">/</span>
        </div>
        <div class="preview-actions">
            <button data-action="toggle-mobile" class="btn-icon-sm" id="mobile-btn" title="Mobile view">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="1" width="6" height="10" rx="1.2"/><circle cx="6" cy="9" r=".7" fill="currentColor"/></svg>
            </button>
            <button id="refresh-btn" class="btn-icon-sm" title="Refresh  F5">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M10 6A4 4 0 112 6M10 6V2.5M10 6H6.5"/></svg>
            </button>
            <button data-action="pop-out" class="btn-icon-sm" title="Open in new tab">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M7 1h4v4M11 1L6 6"/></svg>
            </button>
        </div>
    </div>

    <div class="preview-stage" id="preview-stage">
        <div class="preview-loading" id="preview-loading" style="display:none">
            <div class="preview-spinner"></div>
        </div>
        <iframe
                id="preview-frame"
                name="preview-frame"
                sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups allow-downloads"
                allow="camera; microphone; autoplay; clipboard-read; clipboard-write"
                title="Preview">
        </iframe>
    </div>
</div>

<script type="module">
    import { context, effect, listen, on, emit } from '../../src/oja.full.js';

    const [mobileView] = context('mobile_view');

    const frame   = find('#preview-frame');
    const stage   = find('#preview-stage');
    const loading = find('#preview-loading');
    const routeEl = find('#preview-route');
    const mobileBtn = find('#mobile-btn');

    // Listen for run trigger from app.js
    listen('preview:run', ({ url }) => {
        loading.style.display = 'flex';
        frame.src = url;
    });

    frame.addEventListener('load', () => { loading.style.display = 'none'; });
    frame.addEventListener('error', () => { loading.style.display = 'none'; });

    // Navigation events — update route bar
    window.addEventListener('message', e => {
        if (e.data?.type === 'navigation') {
            routeEl.textContent = e.data.path || '/';
        }
    });

    // Mobile view
    effect(() => {
        stage.classList.toggle('mobile', mobileView());
        mobileBtn.classList.toggle('active', mobileView());
    });

    // Refresh triggers full sync pipeline instead of immediate reload
    on('#refresh-btn', 'click', () => {
        emit('preview:force');
    });
</script>

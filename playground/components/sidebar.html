<div class="sidebar-inner">
    <div class="sidebar-head">
        <span class="sidebar-title">Files</span>
        <div class="sidebar-actions">
            <button data-action="new-file" class="btn-icon-sm" title="New file">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 1v10M1 6h10"/></svg>
            </button>
            <button data-action="pin-sidebar" class="btn-icon-sm" id="pin-btn" title="Pin sidebar open">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M7 1l4 4-1.5 1.5-1-.5L6 8.5V10l-1 1-1-2-2-2 1-1h1.5L7 3.5l-.5-1L8 1z"/><path d="M1 11l3-3"/></svg>
            </button>
        </div>
    </div>
    <div class="file-tree" id="file-tree"></div>
</div>

<script type="module">
    import { context, effect, on, emit } from '../../src/oja.full.js';

    const [files]                      = context('files');
    const [activeFile, setActiveFile]  = context('active_file');
    const [pinned, setPinned]          = context('sidebar_pin');

    const tree   = find('#file-tree');
    const pinBtn = find('#pin-btn');

    let expanded = new Set();
    try { expanded = new Set(JSON.parse(localStorage.getItem('pg_expanded') || '[]')); } catch (_) {}

    const FILE_COLORS = { js:'#f0c040', css:'#5ba4f5', html:'#f87060', json:'#a0c4a0', md:'#a0a4c0' };

    function fileColor(name) {
        return FILE_COLORS[name.split('.').pop()] || '#888';
    }

    function buildTree(map) {
        const root = {};
        for (const path of Object.keys(map).sort()) {
            const parts = path.split('/');
            let cur = root;
            for (let i = 0; i < parts.length; i++) {
                const p = parts[i];
                if (i === parts.length - 1) {
                    cur[p] = { __file: path };
                } else {
                    cur[p] = cur[p] || {};
                    cur = cur[p];
                }
            }
        }
        return root;
    }

    function renderNode(nodes, depth = 0) {
        let html = '';
        const pad = depth * 14;

        const entries = Object.entries(nodes).sort(([an, av], [bn, bv]) => {
            const aFile = av?.__file;
            const bFile = bv?.__file;
            if (!!aFile !== !!bFile) return aFile ? 1 : -1;
            return an.localeCompare(bn);
        });

        for (const [name, node] of entries) {
            if (node?.__file) {
                const path   = node.__file;
                const active = path === activeFile();
                const color  = fileColor(name);
                html += `
            <div class="tree-file ${active ? 'active' : ''}" data-file="${path}" style="padding-left:${pad + 8}px">
                <span class="tree-dot" style="background:${color}"></span>
                <span class="tree-name" title="${path}">${name}</span>
                ${name !== 'index.html' ? `<button class="tree-del" data-del="${path}" title="Delete">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7"/></svg>
                </button>` : ''}
            </div>`;
            } else {
                const isOpen = expanded.has(name);
                html += `
            <div class="tree-folder" data-folder="${name}" style="padding-left:${pad + 8}px">
                <svg class="folder-arrow ${isOpen ? 'open' : ''}" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 3l3 4 3-4"/></svg>
                <span class="tree-folder-name">${name}/</span>
            </div>
            <div class="tree-children ${isOpen ? 'open' : ''}" data-children="${name}">
                ${renderNode(node, depth + 1)}
            </div>`;
            }
        }
        return html;
    }

    effect(() => { files(); activeFile(); tree.innerHTML = renderNode(buildTree(files())); });
    effect(() => { pinBtn.classList.toggle('active', pinned()); });

    on(tree, 'click', e => {
        const delBtn = e.target.closest('[data-del]');
        if (delBtn) {
            e.stopPropagation();
            emit('file:delete', { path: delBtn.dataset.del });
            return;
        }
        const fileEl = e.target.closest('[data-file]');
        if (fileEl) {
            emit('file:open', { path: fileEl.dataset.file });
            return;
        }
        const folder = e.target.closest('[data-folder]');
        if (folder) {
            const name     = folder.dataset.folder;
            const children = tree.querySelector(`[data-children="${name}"]`);
            const arrow    = folder.querySelector('.folder-arrow');
            const isOpen   = children?.classList.contains('open');
            children?.classList.toggle('open', !isOpen);
            arrow?.classList.toggle('open', !isOpen);
            isOpen ? expanded.delete(name) : expanded.add(name);
            localStorage.setItem('pg_expanded', JSON.stringify([...expanded]));
        }
    });

    on(tree, 'contextmenu', e => {
        const fileEl = e.target.closest('[data-file]');
        if (!fileEl) return;
        e.preventDefault();
        const path = fileEl.dataset.file;
        document.querySelector('.tree-ctx')?.remove();
        const menu = document.createElement('div');
        menu.className = 'tree-ctx';
        menu.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;z-index:999`;
        menu.innerHTML = `
        <div class="ctx-item" data-a="copy">Copy path</div>
        <div class="ctx-item" data-a="rename">Rename</div>
        ${path !== 'index.html' ? '<div class="ctx-item ctx-danger" data-a="delete">Delete</div>' : ''}
    `;
        document.body.appendChild(menu);
        menu.addEventListener('click', e => {
            const a = e.target.closest('[data-a]')?.dataset.a;
            if (a === 'copy')   navigator.clipboard.writeText(path);
            if (a === 'rename') emit('file:rename-prompt', { path });
            if (a === 'delete') emit('file:delete', { path });
            menu.remove();
        });
        setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
    });
</script>

<style>

        display: flex; align-items: center; justify-content: space-between;
        padding: 0 8px 0 12px; height: 34px;

        flex-shrink: 0;
    }

        font-size: 10px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .08em;

    }

        display: flex; align-items: center; justify-content: center;
        width: 22px; height: 22px; background: none; border: none; border-radius: 4px;
        color: var(--text-muted); cursor: pointer;
        transition: color .15s, background .15s;
    }
    .btn-icon-sm:hover  { color: var(--text-primary); background: var(--bg-hover); }
    .btn-icon-sm.active { color: var(--accent); background: var(--accent-subtle); }
    .file-tree { flex: 1; overflow-y: auto; padding: 6px 0; }

        display: flex; align-items: center; gap: 6px;

        transition: background .1s, color .1s;
        position: relative; user-select: none;
        padding-right: 8px;
    }
    .tree-file:hover, .tree-folder:hover { background: var(--bg-hover); color: var(--text-primary); }

        content: ''; position: absolute; left: 0; top: 0; bottom: 0;
        width: 2px; background: var(--accent);
    }
    .tree-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        opacity: 0; background: none; border: none; padding: 2px 4px;

        flex-shrink: 0; color: var(--text-muted);
        transition: transform .15s;
        transform: rotate(-90deg);
    }
    .folder-arrow.open { transform: rotate(0deg); }
    .tree-folder-name { font-size: 12px; font-family: var(--mono); color: var(--text-muted); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }
    .tree-ctx {
        background: var(--bg-panel); border: 1px solid var(--border);
        border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
        padding: 4px 0; min-width: 130px;
    }
    .ctx-item {
        padding: 7px 14px; font-size: 12px; cursor: pointer;
        color: var(--text-secondary); transition: background .1s, color .1s;
    }
    .ctx-item:hover    { background: var(--bg-hover); color: var(--text-primary); }
    .ctx-danger        { color: var(--danger); }
    .ctx-danger:hover  { background: var(--danger-subtle); }
</style>

<div class="editor-wrap">
    <div class="editor-header">
        <span class="file-path" id="file-path">index.html</span>
        <div class="editor-actions">
            <span id="cursor-pos" class="cursor-pos"></span>
            <button id="format-btn" class="btn-icon-sm" title="Format  Shift+Alt+F">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 3h10M1 6h7M1 9h9"/></svg>
            </button>
        </div>
    </div>
    <div class="cm-wrap">
        <textarea id="code-area"></textarea>
    </div>
</div>

<script type="module">
    import { context, effect, emit, debounce } from '../../src/oja.full.js';

    const [files, setFiles] = context('files');
    const [activeFile]      = context('active_file');
    const [theme]           = context('theme');

    const pathEl = find('#file-path');

    const editor = CodeMirror.fromTextArea(find('#code-area'), {
        lineNumbers:      true,
        theme:            'dracula',
        mode:             'htmlmixed',
        indentUnit:       2,
        tabSize:          2,
        lineWrapping:     false,
        indentWithTabs:   false,
        autoCloseBrackets:true,
        autoCloseTags:    true,
        matchBrackets:    true,
        extraKeys: {
            'Ctrl-S':       cm => { save(); emit('preview:force'); },
            'Cmd-S':        cm => { save(); emit('preview:force'); },
            'Shift-Alt-F':  cm => { format(cm); return false; },
            'Ctrl-F': 'findPersistent',
            'Cmd-F':  'findPersistent',
            'Ctrl-H': 'replace',
            'Cmd-H':  'replace',
        }
    });

    let internal = false;

    function getModeForFile(path) {
        const ext = path.split('.').pop().toLowerCase();
        return { js: 'javascript', css: 'css', json: 'application/json',
            xml: 'xml', svg: 'xml', md: 'markdown' }[ext] || 'htmlmixed';
    }

    // Switch active file
    effect(() => {
        const path    = activeFile();
        const content = files()[path] ?? '';
        pathEl.textContent = path;
        editor.setOption('mode', getModeForFile(path));
        if (editor.getValue() !== content) {
            internal = true;
            editor.setValue(content);
            editor.clearHistory();
            internal = false;
        }
        setTimeout(() => editor.refresh(), 30);
    });

    // Theme
    effect(() => {
        editor.setOption('theme', theme() === 'dark' ? 'dracula' : 'default');
    });

    // Save on change (debounced)
    function save() {
        if (internal) return;
        const path = activeFile();
        const content = editor.getValue();
        if (files()[path] === content) return;
        setFiles({ ...files(), [path]: content });
        // Tell app.js to persist to VFS
        emit('vfs:save', { path, content });
    }
    const debouncedSave = debounce(save, 350);

    editor.on('change', () => { if (!internal) debouncedSave(); });

    // Cursor position
    editor.on('cursorActivity', () => {
        const c = editor.getCursor();
        find('#cursor-pos').textContent = `${c.line + 1}:${c.ch + 1}`;
    });

    // Format
    function format(cm) {
        const mode = cm.getOption('mode');
        let text = cm.getValue();
        if (mode === 'css') {
            text = text.replace(/\s*\{\s*/g,' {\n    ').replace(/;\s*/g,';\n    ').replace(/\s*\}\s*/g,'\n}\n\n');
        } else if (mode === 'htmlmixed') {
            let indent = 0, out = '';
            for (const line of text.split('\n')) {
                const t = line.trim();
                if (t.match(/^<\//) && indent > 0) indent--;
                out += '  '.repeat(indent) + t + '\n';
                if (t.match(/^<[^\/!][^>]*[^\/]>$/) && !t.match(/^<(br|hr|img|input|meta|link)/i)) indent++;
            }
            text = out;
        }
        cm.setValue(text);
        emit('notify:info', 'Formatted');
    }

    import { on } from '../../src/oja.full.js';
    on('#format-btn', 'click', () => format(editor));

    window.addEventListener('resize', () => editor.refresh());
</script>

<style>

        display: flex;
        flex-direction: column;
        height: 100%;
        background: var(--bg-main);
    }
    .editor-header {
        display: flex;

        justify-content: space-between;
        height: 28px;
        padding: 0 12px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .file-path {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--text-muted);
        letter-spacing: .01em;
    }
    .editor-actions {
        display: flex;
        align-items: center;

    }
    .cursor-pos {

        font-family: var(--mono);
